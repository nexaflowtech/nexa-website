<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C084FC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333EA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9333EA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7E22CE;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flame" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#FB923C;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FBBF24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FDE047;stop-opacity:0.8" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#FAF5FF"/>
  
  <!-- Rocket -->
  <g transform="translate(400, 500)" filter="url(#shadow)">
    <!-- Body -->
    <path d="M -40,0 L -40,-200 Q -40,-270 0,-300 Q 40,-270 40,-200 L 40,0 Z" fill="url(#purpleGrad)"/>
    
    <!-- Window -->
    <circle cx="0" cy="-180" r="35" fill="white" opacity="0.3"/>
    <circle cx="0" cy="-180" r="25" fill="#1E293B" opacity="0.1"/>
    
    <!-- Details -->
    <rect x="-30" y="-120" width="60" height="8" fill="white" opacity="0.3" rx="4"/>
    <rect x="-30" y="-90" width="60" height="8" fill="white" opacity="0.3" rx="4"/>
    <rect x="-30" y="-60" width="60" height="8" fill="white" opacity="0.3" rx="4"/>
    
    <!-- Fins -->
    <path d="M -40,-50 L -80,-10 L -80,30 L -40,10 Z" fill="url(#darkPurple)"/>
    <path d="M 40,-50 L 80,-10 L 80,30 L 40,10 Z" fill="url(#darkPurple)"/>
    
    <!-- Flames -->
    <ellipse cx="-25" cy="15" rx="20" ry="45" fill="url(#flame)"/>
    <ellipse cx="0" cy="20" rx="25" ry="55" fill="url(#flame)" opacity="0.9"/>
    <ellipse cx="25" cy="15" rx="20" ry="45" fill="url(#flame)"/>
  </g>
  
  <!-- Growth Chart -->
  <g transform="translate(120, 350)" filter="url(#shadow)">
    <rect x="0" y="0" width="250" height="180" fill="white" opacity="0.9" rx="12"/>
    
    <!-- Axes -->
    <line x1="30" y1="150" x2="220" y2="150" stroke="#CBD5E1" stroke-width="2"/>
    <line x1="30" y1="30" x2="30" y2="150" stroke="#CBD5E1" stroke-width="2"/>
    
    <!-- Growth Line -->
    <polyline points="30,140 70,120 110,100 150,70 190,40 220,20" 
              stroke="url(#purpleGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
    
    <!-- Data Points -->
    <circle cx="30" cy="140" r="6" fill="#9333EA"/>
    <circle cx="70" cy="120" r="6" fill="#9333EA"/>
    <circle cx="110" cy="100" r="6" fill="#A855F7"/>
    <circle cx="150" cy="70" r="6" fill="#A855F7"/>
    <circle cx="190" cy="40" r="6" fill="#C084FC"/>
    <circle cx="220" cy="20" r="8" fill="#C084FC"/>
  </g>
  
  <!-- Laptop with Code -->
  <g transform="translate(500, 200)" filter="url(#shadow)">
    <rect x="-120" y="0" width="240" height="150" fill="url(#purpleGrad)" rx="12"/>
    <rect x="-110" y="10" width="220" height="115" fill="white" opacity="0.95" rx="8"/>
    
    <!-- Code Lines -->
    <rect x="-95" y="25" width="15" height="8" fill="#9333EA" opacity="0.6" rx="2"/>
    <rect x="-75" y="25" width="50" height="8" fill="#CBD5E1" rx="2"/>
    <rect x="-20" y="25" width="80" height="8" fill="#CBD5E1" rx="2"/>
    
    <rect x="-75" y="45" width="25" height="8" fill="#C084FC" opacity="0.6" rx="2"/>
    <rect x="-45" y="45" width="60" height="8" fill="#CBD5E1" rx="2"/>
    
    <rect x="-95" y="65" width="20" height="8" fill="#9333EA" opacity="0.6" rx="2"/>
    <rect x="-70" y="65" width="70" height="8" fill="#CBD5E1" rx="2"/>
    <rect x="5" y="65" width="40" height="8" fill="#CBD5E1" rx="2"/>
    
    <rect x="-75" y="85" width="35" height="8" fill="#C084FC" opacity="0.6" rx="2"/>
    <rect x="-35" y="85" width="90" height="8" fill="#CBD5E1" rx="2"/>
    
    <rect x="-95" y="105" width="18" height="8" fill="#9333EA" opacity="0.6" rx="2"/>
    <rect x="-72" y="105" width="50" height="8" fill="#CBD5E1" rx="2"/>
    
    <!-- Keyboard -->
    <path d="M -130,150 L -120,170 L 120,170 L 130,150 Z" fill="url(#darkPurple)"/>
  </g>
  
  <!-- Lightbulb (Ideas) -->
  <g transform="translate(150, 180)">
    <circle cx="0" cy="-40" r="32" fill="#FBBF24" opacity="0.8"/>
    <rect x="-12" y="-12" width="24" height="18" fill="#F59E0B" opacity="0.8" rx="4"/>
    <rect x="-8" y="6" width="16" height="8" fill="#64748B" rx="2"/>
    
    <!-- Light Rays -->
    <path d="M -50,-40 L -60,-40" stroke="#FBBF24" stroke-width="3" stroke-linecap="round"/>
    <path d="M 50,-40 L 60,-40" stroke="#FBBF24" stroke-width="3" stroke-linecap="round"/>
    <path d="M 0,-72 L 0,-85" stroke="#FBBF24" stroke-width="3" stroke-linecap="round"/>
    <path d="M 0,-8 L 0,5" stroke="#FBBF24" stroke-width="3" stroke-linecap="round"/>
    <path d="M -35,-65 L -42,-72" stroke="#FBBF24" stroke-width="3" stroke-linecap="round"/>
    <path d="M 35,-65 L 42,-72" stroke="#FBBF24" stroke-width="3" stroke-linecap="round"/>
    <path d="M -35,-15 L -42,-8" stroke="#FBBF24" stroke-width="3" stroke-linecap="round"/>
    <path d="M 35,-15 L 42,-8" stroke="#FBBF24" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Upward Trending Arrow -->
  <g transform="translate(650, 380)">
    <path d="M -40,60 L -40,-20 L 40,-80" stroke="url(#purpleGrad)" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 40,-80 L 20,-65 L 28,-80 L 40,-72" fill="url(#purpleGrad)"/>
  </g>
</svg>
