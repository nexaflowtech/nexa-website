<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
<rect width="600" height="400" rx="20" fill="#F8FAFC"/>
<!-- Nodes -->
<circle cx="100" cy="200" r="30" fill="#0A2540" fill-opacity="0.1"/>
<circle cx="100" cy="200" r="15" fill="#0A2540"/>

<circle cx="300" cy="100" r="40" fill="#2563EB" fill-opacity="0.1"/>
<circle cx="300" cy="100" r="20" fill="#2563EB"/>

<circle cx="300" cy="300" r="30" fill="#14B8A6" fill-opacity="0.1"/>
<circle cx="300" cy="300" r="15" fill="#14B8A6"/>

<circle cx="500" cy="200" r="50" fill="#0A2540" fill-opacity="0.1"/>
<circle cx="500" cy="200" r="25" fill="#0A2540"/>

<!-- Connections -->
<line x1="100" y1="200" x2="300" y2="100" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="5 5"/>
<line x1="100" y1="200" x2="300" y2="300" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="5 5"/>
<line x1="300" y1="100" x2="500" y2="200" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="5 5"/>
<line x1="300" y1="300" x2="500" y2="200" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="5 5"/>
<line x1="300" y1="100" x2="300" y2="300" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="5 5"/>

<!-- Floating Elements -->
<rect x="180" y="80" width="40" height="40" rx="8" fill="white" stroke="#2563EB" stroke-width="2"/>
<rect x="380" y="280" width="30" height="30" rx="6" fill="white" stroke="#14B8A6" stroke-width="2"/>
<rect x="450" y="100" width="20" height="20" rx="4" fill="#0A2540"/>

<!-- Abstract Curves -->
<path d="M0 350C100 350 200 400 300 400C400 400 500 350 600 350V400H0V350Z" fill="#F1F5F9"/>
</svg>
