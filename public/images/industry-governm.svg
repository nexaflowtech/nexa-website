<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grayGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#94A3B8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#64748B;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <rect width="800" height="600" fill="#F8FAFC"/>
  
  <!-- Government Building -->
  <g transform="translate(400, 380)" filter="url(#shadow)">
    <rect x="-200" y="-80" width="400" height="160" fill="url(#grayGrad)" rx="8"/>
    
    <!-- Columns -->
    <rect x="-170" y="-70" width="35" height="140" fill="white" opacity="0.3" rx="4"/>
    <rect x="-100" y="-70" width="35" height="140" fill="white" opacity="0.3" rx="4"/>
    <rect x="-30" y="-70" width="35" height="140" fill="white" opacity="0.3" rx="4"/>
    <rect x="40" y="-70" width="35" height="140" fill="white" opacity="0.3" rx="4"/>
    <rect x="110" y="-70" width="35" height="140" fill="white" opacity="0.3" rx="4"/>
    
    <!-- Roof -->
    <path d="M -220,-80 L 0,-150 L 220,-80 Z" fill="#475569"/>
    
    <!-- Steps -->
    <rect x="-220" y="80" width="440" height="15" fill="#CBD5E1"/>
    <rect x="-230" y="95" width="460" height="15" fill="#94A3B8"/>
    
    <!-- Door -->
    <rect x="-40" y="10" width="80" height="70" fill="#475569" rx="6"/>
  </g>
  
  <!-- Flag -->
  <g transform="translate(550, 180)">
    <rect x="0" y="0" width="6" height="250" fill="#64748B"/>
    <path d="M 6,20 L 100,20 L 100,80 L 6,80 Z" fill="#94A3B8"/>
  </g>
  
  <!-- Digital Citizen Portal -->
  <g transform="translate(150, 180)" filter="url(#shadow)">
    <rect x="0" y="0" width="280" height="200" fill="url(#grayGrad)" rx="12"/>
    <rect x="15" y="15" width="250" height="170" fill="white" opacity="0.95" rx="8"/>
    
    <!-- Portal Content -->
    <circle cx="140" cy="70" r="30" fill="#64748B" opacity="0.3"/>
    <path d="M 140,55 Q 130,45 140,40 Q 150,45 140,55" stroke="#475569" stroke-width="4" fill="none"/>
    <path d="M 115,85 Q 115,105 140,105 Q 165,105 165,85" stroke="#475569" stroke-width="4" fill="none"/>
    
    <rect x="40" y="125" width="200" height="12" fill="#CBD5E1" rx="4"/>
    <rect x="40" y="145" width="160" height="12" fill="#CBD5E1" rx="4"/>
    <rect x="40" y="165" width="180" height="12" fill="#CBD5E1" rx="4"/>
  </g>
  
  <!-- Document/Forms -->
  <g transform="translate(500, 100)" filter="url(#shadow)">
    <rect x="0" y="0" width="180" height="220" fill="white" stroke="#64748B" stroke-width="4" rx="8"/>
    <rect x="20" y="30" width="140" height="10" fill="#CBD5E1" rx="4"/>
    <rect x="20" y="55" width="140" height="10" fill="#CBD5E1" rx="4"/>
    <rect x="20" y="80" width="100" height="10" fill="#CBD5E1" rx="4"/>
    <rect x="20" y="110" width="140" height="10" fill="#CBD5E1" rx="4"/>
    <rect x="20" y="135" width="120" height="10" fill="#CBD5E1" rx="4"/>
    <rect x="20" y="170" width="60" height="30" fill="#94A3B8" rx="6"/>
  </g>
</svg>
