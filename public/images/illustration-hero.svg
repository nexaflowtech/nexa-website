<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F4F8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0F9FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4AA8FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0070B8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#17B897;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0E8E73;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <rect width="800" height="600" fill="url(#bgGrad)"/>
  
  <!-- Main Dashboard Container -->
  <g filter="url(#shadow)">
    <rect x="100" y="80" width="600" height="440" rx="16" fill="white" opacity="0.95"/>
  </g>
  
  <!-- Top Bar -->
  <rect x="100" y="80" width="600" height="50" rx="16" fill="url(#blueGrad)"/>
  <circle cx="130" cy="105" r="6" fill="white" opacity="0.8"/>
  <circle cx="150" cy="105" r="6" fill="white" opacity="0.8"/>
  <circle cx="170" cy="105" r="6" fill="white" opacity="0.8"/>
  
  <!-- Sidebar -->
  <rect x="100" y="130" width="140" height="390" fill="#F8FAFC"/>
  <rect x="120" y="160" width="100" height="8" rx="4" fill="#CBD5E1"/>
  <rect x="120" y="190" width="100" height="8" rx="4" fill="#E2E8F0"/>
  <rect x="120" y="220" width="100" height="8" rx="4" fill="#E2E8F0"/>
  <rect x="120" y="250" width="100" height="8" rx="4" fill="#E2E8F0"/>
  
  <!-- Main Content Area - Charts -->
  <g>
    <!-- Bar Chart -->
    <rect x="270" y="160" width="200" height="120" rx="8" fill="#F8FAFC"/>
    <rect x="285" y="220" width="25" height="40" rx="4" fill="url(#blueGrad)"/>
    <rect x="320" y="200" width="25" height="60" rx="4" fill="url(#tealGrad)"/>
    <rect x="355" y="210" width="25" height="50" rx="4" fill="url(#blueGrad)"/>
    <rect x="390" y="185" width="25" height="75" rx="4" fill="url(#tealGrad)"/>
    <rect x="425" y="195" width="25" height="65" rx="4" fill="url(#blueGrad)"/>
    
    <!-- Line Chart -->
    <rect x="500" y="160" width="180" height="120" rx="8" fill="#F8FAFC"/>
    <polyline points="515,240 540,220 565,225 590,205 615,210 640,195 665,200" 
              stroke="url(#blueGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <polyline points="515,250 540,235 565,238 590,220 615,225 640,212 665,215" 
              stroke="url(#tealGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Dashboard Cards -->
    <rect x="270" y="300" width="140" height="100" rx="8" fill="#F0F9FF"/>
    <circle cx="300" cy="330" r="12" fill="url(#blueGrad)"/>
    <rect x="325" y="325" width="60" height="6" rx="3" fill="#CBD5E1"/>
    <rect x="325" y="340" width="40" height="4" rx="2" fill="#E2E8F0"/>
    <text x="285" y="375" font-family="Arial" font-size="28" font-weight="bold" fill="#0F172A">98%</text>
    <rect x="285" y="385" width="60" height="4" rx="2" fill="#CBD5E1"/>
    
    <rect x="430" y="300" width="140" height="100" rx="8" fill="#F0FDF4"/>
    <circle cx="460" cy="330" r="12" fill="url(#tealGrad)"/>
    <rect x="485" y="325" width="60" height="6" rx="3" fill="#CBD5E1"/>
    <rect x="485" y="340" width="40" height="4" rx="2" fill="#E2E8F0"/>
    <text x="445" y="375" font-family="Arial" font-size="28" font-weight="bold" fill="#0F172A">2.4K</text>
    <rect x="445" y="385" width="60" height="4" rx="2" fill="#CBD5E1"/>
    
    <!-- Bottom Stats -->
    <rect x="270" y="420" width="90" height="60" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="280" y="435" width="70" height="4" rx="2" fill="#CBD5E1"/>
    <rect x="280" y="445" width="50" height="4" rx="2" fill="#E2E8F0"/>
    <circle cx="295" cy="465" r="8" fill="url(#blueGrad)"/>
    
    <rect x="380" y="420" width="90" height="60" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="390" y="435" width="70" height="4" rx="2" fill="#CBD5E1"/>
    <rect x="390" y="445" width="50" height="4" rx="2" fill="#E2E8F0"/>
    <circle cx="405" cy="465" r="8" fill="url(#tealGrad)"/>
    
    <rect x="490" y="420" width="90" height="60" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="500" y="435" width="70" height="4" rx="2" fill="#CBD5E1"/>
    <rect x="500" y="445" width="50" height="4" rx="2" fill="#E2E8F0"/>
    <circle cx="515" cy="465" r="8" fill="url(#blueGrad)"/>
    
    <rect x="600" y="420" width="80" height="60" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="610" y="435" width="60" height="4" rx="2" fill="#CBD5E1"/>
    <rect x="610" y="445" width="40" height="4" rx="2" fill="#E2E8F0"/>
    <circle cx="625" cy="465" r="8" fill="url(#tealGrad)"/>
  </g>
  
  <!-- Decorative Elements -->
  <circle cx="720" cy="120" r="40" fill="#4AA8FF" opacity="0.1"/>
  <circle cx="80" cy="480" r="50" fill="#17B897" opacity="0.1"/>
</svg>
