<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
<rect width="600" height="400" rx="20" fill="#F8FAFC"/>
<!-- Isometric Base -->
<path d="M300 300L100 200L300 100L500 200L300 300Z" fill="#EFF6FF" stroke="#DBEAFE" stroke-width="2"/>
<!-- Nodes -->
<rect x="280" y="80" width="40" height="40" rx="4" fill="#2563EB" opacity="0.8"/>
<rect x="80" y="180" width="40" height="40" rx="4" fill="#0A2540" opacity="0.8"/>
<rect x="480" y="180" width="40" height="40" rx="4" fill="#14B8A6" opacity="0.8"/>
<!-- Connections -->
<path d="M120 200L300 120" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="4 4"/>
<path d="M480 200L300 120" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="4 4"/>
<!-- Floating UI Cards -->
<rect x="250" y="220" width="100" height="60" rx="6" fill="white" filter="url(#shadow)"/>
<rect x="260" y="230" width="80" height="6" rx="3" fill="#E2E8F0"/>
<rect x="260" y="245" width="50" height="6" rx="3" fill="#2563EB"/>
</svg>
