<svg width="600" height="500" viewBox="0 0 600 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4AA8FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0070B8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22C55E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16A34A;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="500" fill="#F8FAFC"/>
  
  <!-- P&L Chart with Growth Arrow -->
  <g>
    <!-- Revenue Chart -->
    <rect x="100" y="120" width="400" height="250" rx="12" fill="white" stroke="#E2E8F0" stroke-width="2"/>
    
    <!-- Grid Lines -->
    <line x1="120" y1="160" x2="480" y2="160" stroke="#F1F5F9" stroke-width="1"/>
    <line x1="120" y1="200" x2="480" y2="200" stroke="#F1F5F9" stroke-width="1"/>
    <line x1="120" y1="240" x2="480" y2="240" stroke="#F1F5F9" stroke-width="1"/>
    <line x1="120" y1="280" x2="480" y2="280" stroke="#F1F5F9" stroke-width="1"/>
    <line x1="120" y1="320" x2="480" y2="320" stroke="#F1F5F9" stroke-width="1"/>
    
    <!-- Revenue Bars - Growing -->
    <rect x="140" y="270" width="40" height="50" rx="4" fill="url(#blueGrad)" opacity="0.6"/>
    <rect x="200" y="250" width="40" height="70" rx="4" fill="url(#blueGrad)" opacity="0.7"/>
    <rect x="260" y="220" width="40" height="100" rx="4" fill="url(#blueGrad)" opacity="0.8"/>
    <rect x="320" y="190" width="40" height="130" rx="4" fill="url(#blueGrad)" opacity="0.9"/>
    <rect x="380" y="160" width="40" height="160" rx="4" fill="url(#blueGrad)"/>
    
    <!-- Profit Line -->
    <polyline points="160,290 220,270 280,240 340,210 400,180" 
              stroke="url(#greenGrad)" stroke-width="4" fill="none" stroke-linecap="round" filter="url(#glow)"/>
    
    <!-- Data Points -->
    <circle cx="160" cy="290" r="6" fill="url(#greenGrad)"/>
    <circle cx="220" cy="270" r="6" fill="url(#greenGrad)"/>
    <circle cx="280" cy="240" r="6" fill="url(#greenGrad)"/>
    <circle cx="340" cy="210" r="6" fill="url(#greenGrad)"/>
    <circle cx="400" cy="180" r="6" fill="url(#greenGrad)"/>
    
    <!-- Labels -->
    <text x="120" y="145" font-family="Arial" font-size="14" font-weight="bold" fill="#0F172A">Revenue Growth</text>
    <text x="120" y="360" font-family="Arial" font-size="11" fill="#64748B">Q1</text>
    <text x="200" y="360" font-family="Arial" font-size="11" fill="#64748B">Q2</text>
    <text x="270" y="360" font-family="Arial" font-size="11" fill="#64748B">Q3</text>
    <text x="330" y="360" font-family="Arial" font-size="11" fill="#64748B">Q4</text>
    <text x="390" y="360" font-family="Arial" font-size="11" fill="#64748B">Q5</text>
  </g>
  
  <!-- Business Modules -->
  <g>
    <rect x="80" y="400" width="100" height="60" rx="8" fill="url(#blueGrad)" opacity="0.9"/>
    <text x="130" y="435" font-family="Arial" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Operations</text>
    
    <rect x="200" y="400" width="100" height="60" rx="8" fill="url(#blueGrad)" opacity="0.9"/>
    <text x="250" y="435" font-family="Arial" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Sales</text>
    
    <rect x="320" y="400" width="100" height="60" rx="8" fill="url(#blueGrad)" opacity="0.9"/>
    <text x="370" y="435" font-family="Arial" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Finance</text>
    
    <rect x="440" y="400" width="100" height="60" rx="8" fill="url(#blueGrad)" opacity="0.9"/>
    <text x="490" y="435" font-family="Arial" font-size="12" font-weight="bold" fill="white" text-anchor="middle">HR</text>
  </g>
  
  <!-- Success Arrow -->
  <g transform="translate(450, 80)">
    <path d="M 0,60 L 0,0 L 60,0" stroke="url(#greenGrad)" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <polygon points="60,0 45,8 52,0 60,-8" fill="url(#greenGrad)"/>
    <text x="70" y="10" font-family="Arial" font-size="16" font-weight="bold" fill="#16A34A">+45%</text>
  </g>
  
  <!-- Decorative Elements -->
  <circle cx="530" cy="250" r="30" fill="#4AA8FF" opacity="0.1"/>
  <circle cx="70" cy="100" r="40" fill="#22C55E" opacity="0.1"/>
</svg>
