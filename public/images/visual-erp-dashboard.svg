<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <!-- Background -->
  <rect width="800" height="600" fill="#F8FAFC"/>
  
  <!-- Sidebar -->
  <rect width="200" height="600" fill="#0F172A"/>
  
  <!-- Sidebar Items -->
  <rect x="20" y="30" width="160" height="40" rx="8" fill="#1E293B"/>
  <rect x="20" y="90" width="160" height="40" rx="8" fill="#334155" opacity="0.5"/>
  <rect x="20" y="150" width="160" height="40" rx="8" fill="#334155" opacity="0.5"/>
  <rect x="20" y="210" width="160" height="40" rx="8" fill="#334155" opacity="0.5"/>
  <rect x="20" y="270" width="160" height="40" rx="8" fill="#334155" opacity="0.5"/>
  
  <!-- Main Content Area -->
  <!-- Header -->
  <rect x="220" y="20" width="560" height="60" rx="12" fill="white"/>
  <text x="240" y="55" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0F172A">ERP Dashboard</text>
  
  <!-- Revenue Card -->
  <rect x="220" y="100" width="260" height="140" rx="12" fill="white"/>
  <text x="240" y="130" font-family="Arial, sans-serif" font-size="14" fill="#64748B">Total Revenue</text>
  <text x="240" y="165" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#0F172A">$2.4M</text>
  <text x="240" y="195" font-family="Arial, sans-serif" font-size="12" fill="#10B981">↑ 23% vs last month</text>
  <!-- Mini chart -->
  <polyline points="240,210 270,200 300,205 330,190 360,195 390,180 420,185 450,175" stroke="#3B82F6" stroke-width="2" fill="none"/>
  
  <!-- Orders Card -->
  <rect x="500" y="100" width="260" height="140" rx="12" fill="white"/>
  <text x="520" y="130" font-family="Arial, sans-serif" font-size="14" fill="#64748B">Active Orders</text>
  <text x="520" y="165" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#0F172A">1,247</text>
  <text x="520" y="195" font-family="Arial, sans-serif" font-size="12" fill="#10B981">↑ 12% vs last week</text>
  <!-- Mini bars -->
  <rect x="520" y="210" width="15" height="20" fill="#3B82F6" opacity="0.3"/>
  <rect x="540" y="205" width="15" height="25" fill="#3B82F6" opacity="0.5"/>
  <rect x="560" y="200" width="15" height="30" fill="#3B82F6" opacity="0.7"/>
  <rect x="580" y="195" width="15" height="35" fill="#3B82F6"/>
  
  <!-- Inventory Table -->
  <rect x="220" y="260" width="540" height="320" rx="12" fill="white"/>
  <text x="240" y="290" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0F172A">Inventory Status</text>
  
  <!-- Table Header -->
  <rect x="240" y="305" width="500" height="35" fill="#F1F5F9"/>
  <text x="250" y="327" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#64748B">PRODUCT</text>
  <text x="420" y="327" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#64748B">STOCK</text>
  <text x="550" y="327" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#64748B">STATUS</text>
  
  <!-- Table Rows -->
  <text x="250" y="365" font-family="Arial, sans-serif" font-size="13" fill="#0F172A">Widget Pro</text>
  <text x="420" y="365" font-family="Arial, sans-serif" font-size="13" fill="#0F172A">2,450</text>
  <rect x="550" y="352" width="60" height="20" rx="10" fill="#DCFCE7"/>
  <text x="560" y="365" font-family="Arial, sans-serif" font-size="11" fill="#16A34A">In Stock</text>
  
  <text x="250" y="405" font-family="Arial, sans-serif" font-size="13" fill="#0F172A">Component X</text>
  <text x="420" y="405" font-family="Arial, sans-serif" font-size="13" fill="#0F172A">450</text>
  <rect x="550" y="392" width="60" height="20" rx="10" fill="#FEF3C7"/>
  <text x="560" y="405" font-family="Arial, sans-serif" font-size="11" fill="#CA8A04">Low Stock</text>
  
  <text x="250" y="445" font-family="Arial, sans-serif" font-size="13" fill="#0F172A">Module Y</text>
  <text x="420" y="445" font-family="Arial, sans-serif" font-size="13" fill="#0F172A">3,120</text>
  <rect x="550" y="432" width="60" height="20" rx="10" fill="#DCFCE7"/>
  <text x="560" y="445" font-family="Arial, sans-serif" font-size="11" fill="#16A34A">In Stock</text>
  
  <text x="250" y="485" font-family="Arial, sans-serif" font-size="13" fill="#0F172A">Part Z</text>
  <text x="420" y="485" font-family="Arial, sans-serif" font-size="13" fill="#0F172A">89</text>
  <rect x="550" y="472" width="60" height="20" rx="10" fill="#FEE2E2"/>
  <text x="560" y="485" font-family="Arial, sans-serif" font-size="11" fill="#DC2626">Critical</text>
  
  <text x="250" y="525" font-family="Arial, sans-serif" font-size="13" fill="#0F172A">Assembly A</text>
  <text x="420" y="525" font-family="Arial, sans-serif" font-size="13" fill="#0F172A">1,890</text>
  <rect x="550" y="512" width="60" height="20" rx="10" fill="#DCFCE7"/>
  <text x="560" y="525" font-family="Arial, sans-serif" font-size="11" fill="#16A34A">In Stock</text>
</svg>
