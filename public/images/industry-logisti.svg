<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818CF8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkIndigo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3730A3;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#EEF2FF"/>
  
  <!-- Delivery Truck -->
  <g transform="translate(250, 280)" filter="url(#shadow)">
    <!-- Cargo Container -->
    <rect x="0" y="0" width="200" height="120" fill="url(#indigoGrad)" rx="8"/>
    <rect x="15" y="15" width="80" height="45" fill="white" opacity="0.3" rx="4"/>
    <rect x="105" y="15" width="80" height="45" fill="white" opacity="0.3" rx="4"/>
    <rect x="15" y="70" width="80" height="35" fill="white" opacity="0.3" rx="4"/>
    <rect x="105" y="70" width="80" height="35" fill="white" opacity="0.3" rx="4"/>
    
    <!-- Cabin -->
    <path d="M 200,30 L 280,30 L 280,120 L 200,120 Z" fill="url(#darkIndigo)"/>
    <rect x="210" y="45" width="55" height="50" fill="white" opacity="0.4" rx="4"/>
    
    <!-- Wheels -->
    <circle cx="50" cy="140" r="22" fill="#1E293B"/>
    <circle cx="50" cy="140" r="12" fill="#64748B"/>
    <circle cx="150" cy="140" r="22" fill="#1E293B"/>
    <circle cx="150" cy="140" r="12" fill="#64748B"/>
    <circle cx="245" cy="140" r="22" fill="#1E293B"/>
    <circle cx="245" cy="140" r="12" fill="#64748B"/>
  </g>
  
  <!-- Map/Route with Markers -->
  <g transform="translate(100, 120)">
    <!-- Map Background -->
    <rect x="0" y="0" width="250" height="180" fill="white" opacity="0.9" rx="12" filter="url(#shadow)"/>
    
    <!-- Roads -->
    <path d="M 30,40 Q 80,60 120,50 Q 160,40 200,70" 
          stroke="#CBD5E1" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M 120,50 Q 140,90 100,130" 
          stroke="#CBD5E1" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M 200,70 Q 220,100 210,140" 
          stroke="#CBD5E1" stroke-width="12" fill="none" stroke-linecap="round"/>
    
    <!-- Route Line -->
    <path d="M 30,40 Q 80,60 120,50 Q 160,40 200,70 Q 220,100 210,140" 
          stroke="#818CF8" stroke-width="4" fill="none" stroke-linecap="round" stroke-dasharray="10,5"/>
    
    <!-- Location Markers -->
    <g transform="translate(30, 20)">
      <path d="M 0,0 Q -8,-20 0,-28 Q 8,-20 0,0" fill="#4F46E5"/>
      <circle cx="0" cy="-20" r="6" fill="white"/>
    </g>
    <g transform="translate(120, 30)">
      <path d="M 0,0 Q -8,-20 0,-28 Q 8,-20 0,0" fill="#818CF8"/>
      <circle cx="0" cy="-20" r="6" fill="white"/>
    </g>
    <g transform="translate(200, 50)">
      <path d="M 0,0 Q -8,-20 0,-28 Q 8,-20 0,0" fill="#4F46E5"/>
      <circle cx="0" cy="-20" r="6" fill="white"/>
    </g>
    <g transform="translate(210, 120)">
      <path d="M 0,0 Q -8,-20 0,-28 Q 8,-20 0,0" fill="#EF4444"/>
      <circle cx="0" cy="-20" r="6" fill="white"/>
    </g>
  </g>
  
  <!-- Packages/Boxes -->
  <g transform="translate(500, 180)" filter="url(#shadow)">
    <rect x="0" y="60" width="80" height="80" fill="url(#indigoGrad)" rx="6"/>
    <rect x="10" y="70" width="60" height="6" fill="white" opacity="0.3"/>
    <rect x="35" y="70" width="10" height="60" fill="white" opacity="0.3"/>
    
    <rect x="100" y="40" width="90" height="100" fill="url(#darkIndigo)" rx="6"/>
    <rect x="110" y="50" width="70" height="6" fill="white" opacity="0.3"/>
    <rect x="140" y="50" width="10" height="80" fill="white" opacity="0.3"/>
    
    <rect x="210" y="80" width="70" height="60" fill="#6366F1" rx="6"/>
    <rect x="220" y="90" width="50" height="6" fill="white" opacity="0.3"/>
    <rect x="240" y="90" width="10" height="40" fill="white" opacity="0.3"/>
  </g>
  
  <!-- Barcode Scanner -->
  <g transform="translate(520, 380)">
    <rect x="0" y="0" width="120" height="80" fill="url(#indigoGrad)" rx="8"/>
    <rect x="10" y="20" width="100" height="45" fill="white" opacity="0.9" rx="4"/>
    
    <!-- Barcode -->
    <rect x="20" y="30" width="4" height="25" fill="#1E293B"/>
    <rect x="28" y="30" width="8" height="25" fill="#1E293B"/>
    <rect x="40" y="30" width="4" height="25" fill="#1E293B"/>
    <rect x="48" y="30" width="6" height="25" fill="#1E293B"/>
    <rect x="58" y="30" width="4" height="25" fill="#1E293B"/>
    <rect x="66" y="30" width="10" height="25" fill="#1E293B"/>
    <rect x="80" y="30" width="4" height="25" fill="#1E293B"/>
    <rect x="88" y="30" width="6" height="25" fill="#1E293B"/>
    <rect x="98" y="30" width="8" height="25" fill="#1E293B"/>
  </g>
  
  <!-- Tracking GPS Signal -->
  <g transform="translate(650, 120)">
    <circle cx="0" cy="0" r="40" stroke="#818CF8" stroke-width="3" fill="none" opacity="0.4"/>
    <circle cx="0" cy="0" r="60" stroke="#818CF8" stroke-width="2" fill="none" opacity="0.3"/>
    <circle cx="0" cy="0" r="80" stroke="#818CF8" stroke-width="2" fill="none" opacity="0.2"/>
    <circle cx="0" cy="0" r="15" fill="#4F46E5"/>
    <circle cx="0" cy="0" r="8" fill="white" opacity="0.5"/>
  </g>
</svg>
