<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
<rect width="600" height="400" rx="20" fill="#F8FAFC"/>
<!-- Isometric Floor -->
<path d="M300 350L50 225L300 100L550 225L300 350Z" fill="#E2E8F0" opacity="0.5"/>
<path d="M300 350L300 360" stroke="#CBD5E1" stroke-width="2"/>

<!-- Conveyor Belt -->
<path d="M150 225L450 225" stroke="#94A3B8" stroke-width="20" stroke-linecap="round"/>
<path d="M150 225L450 225" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="10 10"/>

<!-- Machines -->
<g transform="translate(200, 180)">
<rect x="0" y="0" width="40" height="60" fill="#0A2540"/>
<rect x="5" y="5" width="30" height="20" fill="#14B8A6"/>
</g>
<g transform="translate(360, 180)">
<rect x="0" y="0" width="40" height="60" fill="#0A2540"/>
<rect x="5" y="5" width="30" height="20" fill="#2563EB"/>
</g>

<!-- Dashboard Overlay -->
<rect x="400" y="50" width="120" height="80" rx="8" fill="white" stroke="#E2E8F0" stroke-width="2"/>
<rect x="410" y="60" width="100" height="10" rx="2" fill="#E2E8F0"/>
<rect x="410" y="80" width="40" height="40" rx="2" fill="#2563EB" opacity="0.2"/>
<rect x="460" y="80" width="40" height="40" rx="2" fill="#14B8A6" opacity="0.2"/>
</svg>
