<svg width="600" height="500" viewBox="0 0 600 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4AA8FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0070B8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="500" fill="#F8FAFC"/>
  
  <!-- Central Hub - Project Manager -->
  <g filter="url(#shadow)">
    <circle cx="300" cy="250" r="60" fill="url(#purpleGrad)"/>
    <circle cx="300" cy="235" r="20" fill="white" opacity="0.9"/>
    <path d="M 270,270 Q 270,295 300,295 Q 330,295 330,270" stroke="white" stroke-width="8" fill="none" opacity="0.9" stroke-linecap="round"/>
  </g>
  <text x="300" y="335" font-family="Arial" font-size="13" font-weight="bold" fill="#0F172A" text-anchor="middle">Project Manager</text>
  
  <!-- Team Members -->
  <!-- Top Left - Frontend Dev -->
  <g transform="translate(120, 100)">
    <circle cx="0" cy="0" r="40" fill="url(#blueGrad)" opacity="0.9" filter="url(#shadow)"/>
    <circle cx="0" cy="-10" r="14" fill="white" opacity="0.9"/>
    <path d="M -20,10 Q -20,25 0,25 Q 20,25 20,10" stroke="white" stroke-width="6" fill="none" opacity="0.9" stroke-linecap="round"/>
    <text x="0" y="55" font-family="Arial" font-size="10" fill="#64748B" text-anchor="middle">Frontend</text>
  </g>
  
  <!-- Top Right - Backend Dev -->
  <g transform="translate(480, 100)">
    <circle cx="0" cy="0" r="40" fill="url(#blueGrad)" opacity="0.9" filter="url(#shadow)"/>
    <circle cx="0" cy="-10" r="14" fill="white" opacity="0.9"/>
    <path d="M -20,10 Q -20,25 0,25 Q 20,25 20,10" stroke="white" stroke-width="6" fill="none" opacity="0.9" stroke-linecap="round"/>
    <text x="0" y="55" font-family="Arial" font-size="10" fill="#64748B" text-anchor="middle">Backend</text>
  </g>
  
  <!-- Middle Left - UI/UX Designer -->
  <g transform="translate(100, 250)">
    <circle cx="0" cy="0" r="40" fill="url(#blueGrad)" opacity="0.9" filter="url(#shadow)"/>
    <circle cx="0" cy="-10" r="14" fill="white" opacity="0.9"/>
    <path d="M -20,10 Q -20,25 0,25 Q 20,25 20,10" stroke="white" stroke-width="6" fill="none" opacity="0.9" stroke-linecap="round"/>
    <text x="0" y="55" font-family="Arial" font-size="10" fill="#64748B" text-anchor="middle">UI/UX</text>
  </g>
  
  <!-- Middle Right - DevOps -->
  <g transform="translate(500, 250)">
    <circle cx="0" cy="0" r="40" fill="url(#blueGrad)" opacity="0.9" filter="url(#shadow)"/>
    <circle cx="0" cy="-10" r="14" fill="white" opacity="0.9"/>
    <path d="M -20,10 Q -20,25 0,25 Q 20,25 20,10" stroke="white" stroke-width="6" fill="none" opacity="0.9" stroke-linecap="round"/>
    <text x="0" y="55" font-family="Arial" font-size="10" fill="#64748B" text-anchor="middle">DevOps</text>
  </g>
  
  <!-- Bottom Left - QA -->
  <g transform="translate(150, 400)">
    <circle cx="0" cy="0" r="40" fill="url(#blueGrad)" opacity="0.9" filter="url(#shadow)"/>
    <circle cx="0" cy="-10" r="14" fill="white" opacity="0.9"/>
    <path d="M -20,10 Q -20,25 0,25 Q 20,25 20,10" stroke="white" stroke-width="6" fill="none" opacity="0.9" stroke-linecap="round"/>
    <text x="0" y="55" font-family="Arial" font-size="10" fill="#64748B" text-anchor="middle">QA</text>
  </g>
  
  <!-- Bottom Right - Data Engineer -->
  <g transform="translate(450, 400)">
    <circle cx="0" cy="0" r="40" fill="url(#blueGrad)" opacity="0.9" filter="url(#shadow)"/>
    <circle cx="0" cy="-10" r="14" fill="white" opacity="0.9"/>
    <path d="M -20,10 Q -20,25 0,25 Q 20,25 20,10" stroke="white" stroke-width="6" fill="none" opacity="0.9" stroke-linecap="round"/>
    <text x="0" y="55" font-family="Arial" font-size="10" fill="#64748B" text-anchor="middle">Data Eng</text>
  </g>
  
  <!-- Connection Lines -->
  <line x1="165" y1="130" x2="250" y2="210" stroke="url(#purpleGrad)" stroke-width="2" opacity="0.6"/>
  <line x1="435" y1="130" x2="350" y2="210" stroke="url(#purpleGrad)" stroke-width="2" opacity="0.6"/>
  <line x1="145" y1="250" x2="235" y2="250" stroke="url(#purpleGrad)" stroke-width="2" opacity="0.6"/>
  <line x1="455" y1="250" x2="365" y2="250" stroke="url(#purpleGrad)" stroke-width="2" opacity="0.6"/>
  <line x1="185" y1="373" x2="265" y2="295" stroke="url(#purpleGrad)" stroke-width="2" opacity="0.6"/>
  <line x1="415" y1="373" x2="335" y2="295" stroke="url(#purpleGrad)" stroke-width="2" opacity="0.6"/>
  
  <!-- Collaboration Indicators -->
  <g>
    <circle cx="207" cy="170" r="8" fill="#FCD34D"/>
    <circle cx="392" cy="170" r="8" fill="#FCD34D"/>
    <circle cx="190" cy="250" r="8" fill="#FCD34D"/>
    <circle cx="410" cy="250" r="8" fill="#FCD34D"/>
    <circle cx="225" cy="335" r="8" fill="#FCD34D"/>
    <circle cx="375" cy="335" r="8" fill="#FCD34D"/>
  </g>
  
  <!-- Scale Indicator -->
  <g transform="translate(230, 60)">
    <rect width="140" height="35" rx="17.5" fill="white" stroke="url(#purpleGrad)" stroke-width="2"/>
    <text x="70" y="23" font-family="Arial" font-size="13" font-weight="bold" fill="#7C3AED" text-anchor="middle">Scales With You</text>
  </g>
  
  <!-- Growth Arrow -->
  <g transform="translate(50, 350)">
    <path d="M 0,0 L 30,0 L 30,-15 L 45,5 L 30,25 L 30,10 L 0,10 Z" fill="url(#blueGrad)" opacity="0.7"/>
  </g>
</svg>
