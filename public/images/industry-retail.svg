<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lightBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#93C5FD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#EFF6FF"/>
  
  <!-- Shopping Cart -->
  <g transform="translate(150, 200)" filter="url(#shadow)">
    <rect x="0" y="60" width="140" height="120" fill="url(#blueGrad)" rx="8"/>
    <rect x="10" y="70" width="120" height="100" fill="white" opacity="0.3" rx="4"/>
    <circle cx="40" cy="200" r="18" fill="#1E40AF"/>
    <circle cx="40" cy="200" r="10" fill="white" opacity="0.3"/>
    <circle cx="100" cy="200" r="18" fill="#1E40AF"/>
    <circle cx="100" cy="200" r="10" fill="white" opacity="0.3"/>
    <path d="M -20,20 L -10,60 L 150,60 L 160,20 Z" fill="url(#blueGrad)"/>
  </g>
  
  <!-- Product Boxes in Cart -->
  <rect x="165" y="280" width="35" height="35" fill="#60A5FA" opacity="0.8" rx="4"/>
  <rect x="210" y="280" width="35" height="35" fill="#93C5FD" opacity="0.8" rx="4"/>
  <rect x="255" y="280" width="35" height="35" fill="#60A5FA" opacity="0.8" rx="4"/>
  <rect x="165" y="330" width="35" height="35" fill="#93C5FD" opacity="0.8" rx="4"/>
  <rect x="210" y="330" width="35" height="35" fill="#60A5FA" opacity="0.8" rx="4"/>
  
  <!-- Mobile Device/Tablet -->
  <g transform="translate(450, 150)" filter="url(#shadow)">
    <rect x="0" y="0" width="280" height="380" fill="url(#blueGrad)" rx="20"/>
    <rect x="15" y="50" width="250" height="280" fill="white" opacity="0.9" rx="8"/>
    
    <!-- Screen Content - Product Grid -->
    <rect x="30" y="70" width="70" height="80" fill="url(#lightBlue)" opacity="0.7" rx="4"/>
    <rect x="115" y="70" width="70" height="80" fill="url(#lightBlue)" opacity="0.7" rx="4"/>
    <rect x="200" y="70" width="50" height="80" fill="url(#lightBlue)" opacity="0.7" rx="4"/>
    
    <rect x="30" y="165" width="70" height="80" fill="url(#lightBlue)" opacity="0.7" rx="4"/>
    <rect x="115" y="165" width="70" height="80" fill="url(#lightBlue)" opacity="0.7" rx="4"/>
    <rect x="200" y="165" width="50" height="80" fill="url(#lightBlue)" opacity="0.7" rx="4"/>
    
    <rect x="30" y="260" width="70" height="50" fill="url(#lightBlue)" opacity="0.7" rx="4"/>
    <rect x="115" y="260" width="70" height="50" fill="url(#lightBlue)" opacity="0.7" rx="4"/>
    <rect x="200" y="260" width="50" height="50" fill="url(#lightBlue)" opacity="0.7" rx="4"/>
    
    <!-- Home Button -->
    <circle cx="140" cy="355" r="12" fill="white" opacity="0.5"/>
  </g>
  
  <!-- Credit Card -->
  <g transform="translate(150, 450)" filter="url(#shadow)">
    <rect x="0" y="0" width="200" height="120" fill="url(#blueGrad)" rx="12"/>
    <rect x="0" y="20" width="200" height="30" fill="#1E40AF"/>
    <rect x="20" y="70" width="50" height="35" fill="white" opacity="0.3" rx="4"/>
    <rect x="85" y="85" width="100" height="8" fill="white" opacity="0.5" rx="4"/>
    <rect x="85" y="97" width="80" height="6" fill="white" opacity="0.4" rx="3"/>
  </g>
  
  <!-- Analytics Chart -->
  <g transform="translate(500, 420)">
    <rect x="0" y="120" width="200" height="4" fill="#CBD5E1"/>
    <rect x="20" y="80" width="30" height="40" fill="#60A5FA" rx="4"/>
    <rect x="65" y="50" width="30" height="70" fill="#93C5FD" rx="4"/>
    <rect x="110" y="60" width="30" height="60" fill="#60A5FA" rx="4"/>
    <rect x="155" y="30" width="30" height="90" fill="#2563EB" rx="4"/>
  </g>
  
  <!-- Sale Tag -->
  <g transform="translate(380, 320)">
    <circle cx="0" cy="0" r="45" fill="#EF4444"/>
    <text x="0" y="-8" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">50%</text>
    <text x="0" y="10" font-family="Arial" font-size="12" font-weight="bold" fill="white" text-anchor="middle">OFF</text>
  </g>
</svg>
