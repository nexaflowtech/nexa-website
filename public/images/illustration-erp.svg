<svg width="800" height="800" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4AA8FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0070B8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#17B897;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0E8E73;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="800" fill="#F0F9FF"/>
  
  <!-- Central Hub -->
  <g filter="url(#shadow)">
    <circle cx="400" cy="400" r="100" fill="url(#blueGrad)"/>
  </g>
  <text x="400" y="395" font-family="Arial" font-size="22" font-weight="bold" fill="white" text-anchor="middle">Unified</text>
  <text x="400" y="420" font-family="Arial" font-size="22" font-weight="bold" fill="white" text-anchor="middle">ERP Core</text>
  
  <!-- Module Circles -->
  <!-- Financial Accounting - Top -->
  <g transform="translate(400, 200)">
    <circle cx="0" cy="0" r="70" fill="url(#tealGrad)" filter="url(#shadow)" opacity="0.95"/>
    <path d="M -15,-10 L -15,15 L 15,15 L 15,-10 L 10,-10 L 10,-15 L 5,-15 L 5,-10 Z" fill="white" stroke="white" stroke-width="2"/>
    <text y="45" font-family="Arial" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Accounting</text>
  </g>
  
  <!-- HR & Payroll - Top Right -->
  <g transform="translate(600, 280)">
    <circle cx="0" cy="0" r="65" fill="url(#purpleGrad)" filter="url(#shadow)" opacity="0.95"/>
    <circle cx="0" cy="-8" r="12" fill="white"/>
    <path d="M -18,8 Q -18,22 0,22 Q 18,22 18,8" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
    <text y="40" font-family="Arial" font-size="12" font-weight="bold" fill="white" text-anchor="middle">HR</text>
  </g>
  
  <!-- CRM & Sales - Right -->
  <g transform="translate(650, 450)">
    <circle cx="0" cy="0" r="65" fill="url(#blueGrad)" filter="url(#shadow)" opacity="0.95"/>
    <path d="M -15,-5 Q -15,-15 -5,-15 Q 0,-15 0,-10 Q 0,-15 5,-15 Q 15,-15 15,-5 Q 15,5 5,15 L 0,20 L -5,15 Q -15,5 -15,-5" fill="white"/>
    <text y="40" font-family="Arial" font-size="12" font-weight="bold" fill="white" text-anchor="middle">CRM</text>
  </g>
  
  <!-- Inventory - Bottom Right -->
  <g transform="translate(600, 620)">
    <circle cx="0" cy="0" r="65" fill="url(#tealGrad)" filter="url(#shadow)" opacity="0.95"/>
    <rect x="-15" y="-18" width="30" height="25" rx="2" fill="none" stroke="white" stroke-width="3"/>
    <rect x="-12" y="-13" width="24" height="20" rx="2" fill="white" opacity="0.5"/>
    <text y="40" font-family="Arial" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Inventory</text>
  </g>
  
  <!-- Project Management - Bottom -->
  <g transform="translate(400, 680)">
    <circle cx="0" cy="0" r="65" fill="url(#purpleGrad)" filter="url(#shadow)" opacity="0.95"/>
    <rect x="-15" y="-12" width="30" height="24" rx="3" fill="none" stroke="white" stroke-width="3"/>
    <line x1="-10" y1="-5" x2="10" y2="-5" stroke="white" stroke-width="2"/>
    <line x1="-10" y1="2" x2="10" y2="2" stroke="white" stroke-width="2"/>
    <text y="40" font-family="Arial" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Projects</text>
  </g>
  
  <!-- Help Desk - Bottom Left -->
  <g transform="translate(200, 620)">
    <circle cx="0" cy="0" r="65" fill="url(#blueGrad)" filter="url(#shadow)" opacity="0.95"/>
    <circle cx="0" cy="-5" r="15" fill="none" stroke="white" stroke-width="3"/>
    <path d="M -8,12 L -8,18 L 8,18 L 8,12" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
    <text y="40" font-family="Arial" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Help Desk</text>
  </g>
  
  <!-- Manufacturing - Left -->
  <g transform="translate(150, 450)">
    <circle cx="0" cy="0" r="65" fill="url(#tealGrad)" filter="url(#shadow)" opacity="0.95"/>
    <rect x="-12" y="-15" width="24" height="30" rx="2" fill="none" stroke="white" stroke-width="3"/>
    <line x1="-8" y1="-8" x2="8" y2="-8" stroke="white" stroke-width="2"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="white" stroke-width="2"/>
    <line x1="-8" y1="8" x2="8" y2="8" stroke="white" stroke-width="2"/>
    <text y="40" font-family="Arial" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Manufacturing</text>
  </g>
  
  <!-- Supply Chain - Top Left -->
  <g transform="translate(200, 280)">
    <circle cx="0" cy="0" r="65" fill="url(#purpleGrad)" filter="url(#shadow)" opacity="0.95"/>
    <path d="M -15,0 L -5,-10 L 5,-10 L 15,0 L 5,10 L -5,10 Z" fill="white"/>
    <circle cx="-12" cy="0" r="3" fill="#7C3AED"/>
    <circle cx="12" cy="0" r="3" fill="#7C3AED"/>
    <text y="40" font-family="Arial" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Supply Chain</text>
  </g>
  
  <!-- Connection Lines -->
  <line x1="400" y1="300" x2="400" y2="270" stroke="#CBD5E1" stroke-width="3" opacity="0.7"/>
  <line x1="455" y1="338" x2="535" y2="297" stroke="#CBD5E1" stroke-width="3" opacity="0.7"/>
  <line x1="485" y1="390" x2="585" y2="430" stroke="#CBD5E1" stroke-width="3" opacity="0.7"/>
  <line x1="468" y1="470" x2="535" y2="590" stroke="#CBD5E1" stroke-width="3" opacity="0.7"/>
  <line x1="400" y1="500" x2="400" y2="615" stroke="#CBD5E1" stroke-width="3" opacity="0.7"/>
  <line x1="332" y1="470" x2="265" y2="590" stroke="#CBD5E1" stroke-width="3" opacity="0.7"/>
  <line x1="315" y1="390" x2="215" y2="430" stroke="#CBD5E1" stroke-width="3" opacity="0.7"/>
  <line x1="345" y1="338" x2="265" y2="297" stroke="#CBD5E1" stroke-width="3" opacity="0.7"/>
  
  <!-- Data Flow Indicators -->
  <g opacity="0.8">
    <circle cx="400" cy="285" r="5" fill="#17B897"/>
    <circle cx="490" cy="318" r="5" fill="#17B897"/>
    <circle cx="535" cy="410" r="5" fill="#17B897"/>
    <circle cx="502" cy="530" r="5" fill="#17B897"/>
    <circle cx="400" cy="558" r="5" fill="#17B897"/>
    <circle cx="298" cy="530" r="5" fill="#17B897"/>
    <circle cx="265" cy="410" r="5" fill="#17B897"/>
    <circle cx="305" cy="318" r="5" fill="#17B897"/>
  </g>
  
  <!-- Title -->
  <g transform="translate(400, 80)">
    <rect x="-180" y="-30" width="360" height="50" rx="25" fill="white" filter="url(#shadow)"/>
    <text y="5" font-family="Arial" font-size="20" font-weight="bold" fill="url(#blueGrad)" text-anchor="middle">One System. Total Control.</text>
  </g>
</svg>
