<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5EEAD4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14B8A6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14B8A6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D9488;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#F0FDFA"/>
  
  <!-- Medical Cross Symbol -->
  <g transform="translate(400, 200)" filter="url(#shadow)">
    <rect x="-60" y="-20" width="120" height="40" fill="url(#tealGrad)" rx="8"/>
    <rect x="-20" y="-60" width="40" height="120" fill="url(#tealGrad)" rx="8"/>
  </g>
  
  <!-- Stethoscope -->
  <g transform="translate(250, 350)">
    <path d="M 0,0 Q -30,-50 0,-100 Q 30,-50 0,0" stroke="url(#darkTeal)" stroke-width="12" fill="none" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="25" fill="url(#tealGrad)"/>
    <circle cx="0" cy="0" r="15" fill="white" opacity="0.3"/>
    <circle cx="-30" cy="-100" r="18" fill="url(#darkTeal)"/>
    <circle cx="30" cy="-100" r="18" fill="url(#darkTeal)"/>
  </g>
  
  <!-- Heart Rate Monitor -->
  <g transform="translate(150, 450)" filter="url(#shadow)">
    <rect x="0" y="0" width="500" height="100" fill="url(#tealGrad)" rx="12"/>
    <rect x="15" y="15" width="470" height="70" fill="white" opacity="0.9" rx="8"/>
    
    <!-- Heart Rate Line -->
    <polyline points="30,50 80,50 100,30 120,70 140,50 500,50" 
              stroke="#14B8A6" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Medical Records/Clipboard -->
  <g transform="translate(550, 280)" filter="url(#shadow)">
    <rect x="0" y="0" width="180" height="240" fill="url(#darkTeal)" rx="12"/>
    <rect x="15" y="30" width="150" height="195" fill="white" opacity="0.9" rx="8"/>
    
    <!-- Clip -->
    <rect x="60" y="-10" width="60" height="45" fill="#64748B" rx="8"/>
    <rect x="70" y="0" width="40" height="30" fill="white" opacity="0.3" rx="4"/>
    
    <!-- Content Lines -->
    <rect x="30" y="50" width="120" height="8" fill="#CBD5E1" rx="4"/>
    <rect x="30" y="70" width="120" height="8" fill="#CBD5E1" rx="4"/>
    <rect x="30" y="90" width="90" height="8" fill="#CBD5E1" rx="4"/>
    
    <rect x="30" y="120" width="120" height="8" fill="#CBD5E1" rx="4"/>
    <rect x="30" y="140" width="100" height="8" fill="#CBD5E1" rx="4"/>
    
    <rect x="30" y="170" width="120" height="8" fill="#CBD5E1" rx="4"/>
    <rect x="30" y="190" width="110" height="8" fill="#CBD5E1" rx="4"/>
  </g>
  
  <!-- Pills/Medicine -->
  <g transform="translate(100, 200)">
    <ellipse cx="0" cy="0" rx="40" ry="15" fill="#5EEAD4" opacity="0.8" transform="rotate(-45)"/>
    <ellipse cx="0" cy="0" rx="20" ry="15" fill="#14B8A6" opacity="0.8" transform="rotate(-45)"/>
  </g>
  
  <g transform="translate(180, 250)">
    <ellipse cx="0" cy="0" rx="40" ry="15" fill="#14B8A6" opacity="0.8" transform="rotate(30)"/>
    <ellipse cx="0" cy="0" rx="20" ry="15" fill="#0D9488" opacity="0.8" transform="rotate(30)"/>
  </g>
  
  <g transform="translate(130, 300)">
    <circle cx="0" cy="0" r="20" fill="#5EEAD4" opacity="0.8"/>
    <circle cx="0" cy="0" r="10" fill="#14B8A6" opacity="0.8"/>
  </g>
  
  <!-- Heart Symbol -->
  <g transform="translate(650, 150)">
    <path d="M 0,15 Q -35,-20 -50,0 Q -50,30 0,60 Q 50,30 50,0 Q 35,-20 0,15" 
          fill="#EF4444" opacity="0.8"/>
    <circle cx="-8" cy="35" r="3" fill="white" opacity="0.5"/>
  </g>
</svg>
