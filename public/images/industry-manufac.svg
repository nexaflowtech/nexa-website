<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FB923C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EA580C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EA580C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C2410C;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#FFF7ED"/>
  
  <!-- Factory Building -->
  <g filter="url(#shadow)">
    <rect x="150" y="250" width="200" height="200" fill="url(#orangeGrad)" rx="8"/>
    <rect x="400" y="200" width="250" height="250" fill="url(#darkOrange)" rx="8"/>
  </g>
  
  <!-- Windows -->
  <rect x="170" y="280" width="40" height="50" fill="white" opacity="0.3" rx="4"/>
  <rect x="220" y="280" width="40" height="50" fill="white" opacity="0.3" rx="4"/>
  <rect x="270" y="280" width="40" height="50" fill="white" opacity="0.3" rx="4"/>
  <rect x="170" y="350" width="40" height="50" fill="white" opacity="0.3" rx="4"/>
  <rect x="220" y="350" width="40" height="50" fill="white" opacity="0.3" rx="4"/>
  <rect x="270" y="350" width="40" height="50" fill="white" opacity="0.3" rx="4"/>
  
  <rect x="430" y="230" width="50" height="60" fill="white" opacity="0.3" rx="4"/>
  <rect x="500" y="230" width="50" height="60" fill="white" opacity="0.3" rx="4"/>
  <rect x="570" y="230" width="50" height="60" fill="white" opacity="0.3" rx="4"/>
  <rect x="430" y="310" width="50" height="60" fill="white" opacity="0.3" rx="4"/>
  <rect x="500" y="310" width="50" height="60" fill="white" opacity="0.3" rx="4"/>
  <rect x="570" y="310" width="50" height="60" fill="white" opacity="0.3" rx="4"/>
  <rect x="430" y="390" width="50" height="50" fill="white" opacity="0.3" rx="4"/>
  <rect x="500" y="390" width="50" height="50" fill="white" opacity="0.3" rx="4"/>
  <rect x="570" y="390" width="50" height="50" fill="white" opacity="0.3" rx="4"/>
  
  <!-- Smokestacks -->
  <rect x="360" y="130" width="30" height="120" fill="#D97706" rx="4"/>
  <rect x="660" y="100" width="35" height="100" fill="#C2410C" rx="4"/>
  
  <!-- Smoke -->
  <circle cx="375" cy="110" r="15" fill="#94A3B8" opacity="0.4"/>
  <circle cx="370" cy="95" r="18" fill="#94A3B8" opacity="0.3"/>
  <circle cx="380" cy="80" r="20" fill="#94A3B8" opacity="0.2"/>
  <circle cx="677" cy="80" r="18" fill="#94A3B8" opacity="0.4"/>
  <circle cx="670" cy="65" r="22" fill="#94A3B8" opacity="0.3"/>
  <circle cx="685" cy="50" r="25" fill="#94A3B8" opacity="0.2"/>
  
  <!-- Conveyor Belt -->
  <rect x="80" y="440" width="640" height="15" fill="#64748B" rx="7"/>
  
  <!-- Gears/Cogs -->
  <g transform="translate(250, 500)">
    <circle cx="0" cy="0" r="30" fill="url(#orangeGrad)"/>
    <circle cx="0" cy="0" r="15" fill="white" opacity="0.3"/>
    <rect x="-5" y="-35" width="10" height="15" fill="url(#orangeGrad)" rx="2"/>
    <rect x="-5" y="20" width="10" height="15" fill="url(#orangeGrad)" rx="2"/>
    <rect x="-35" y="-5" width="15" height="10" fill="url(#orangeGrad)" rx="2"/>
    <rect x="20" y="-5" width="15" height="10" fill="url(#orangeGrad)" rx="2"/>
  </g>
  
  <g transform="translate(550, 500)">
    <circle cx="0" cy="0" r="35" fill="url(#darkOrange)"/>
    <circle cx="0" cy="0" r="18" fill="white" opacity="0.3"/>
    <rect x="-6" y="-40" width="12" height="18" fill="url(#darkOrange)" rx="2"/>
    <rect x="-6" y="22" width="12" height="18" fill="url(#darkOrange)" rx="2"/>
    <rect x="-40" y="-6" width="18" height="12" fill="url(#darkOrange)" rx="2"/>
    <rect x="22" y="-6" width="18" height="12" fill="url(#darkOrange)" rx="2"/>
  </g>
  
  <!-- Production Line Items -->
  <rect x="120" y="420" width="40" height="20" fill="#FB923C" opacity="0.8" rx="4"/>
  <rect x="200" y="420" width="40" height="20" fill="#FB923C" opacity="0.8" rx="4"/>
  <rect x="380" y="420" width="40" height="20" fill="#EA580C" opacity="0.8" rx="4"/>
  <rect x="480" y="420" width="40" height="20" fill="#EA580C" opacity="0.8" rx="4"/>
  <rect x="600" y="420" width="40" height="20" fill="#C2410C" opacity="0.8" rx="4"/>
</svg>
